<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>给佳佳的告白 ❤️</title>

<style>
body {
    margin: 0;
    font-family: "Microsoft YaHei", sans-serif;
    background: linear-gradient(to bottom, #ff9a9e, #fad0c4);
    color: white;
    text-align: center;
}

.container {
    padding: 50px 20px;
    animation: fadeIn 2s ease-in-out;
}

h1 {
    font-size: 48px;
}

p {
    font-size: 20px;
    max-width: 600px;
    margin: 20px auto;
}

img {
    width: 300px;
    border-radius: 20px;
    margin-top: 20px;
}

video {
    width: 320px;
    margin-top: 20px;
    border-radius: 15px;
}

button {
    margin-top: 30px;
    padding: 10px 20px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background-color: white;
    color: #ff4d6d;
    cursor: pointer;
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}
</style>

</head>

<body>

<div class="container">
    <h1>佳佳 ❤️</h1>

    <p>
        从遇见你的那一刻起，<br>
        我的世界就变得不一样了。<br><br>
        我喜欢你，不是冲动，是认真。<br>
        希望未来的每一天，都有你在身边。
    </p>

    <!-- 图片 -->
    <img src="https://picsum.photos/300/200" alt="我们的回忆">

    <!-- 视频 -->
    <video controls>
        <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
        你的浏览器不支持视频播放
    </video>

    <br>

    <button onclick="alert('我喜欢你 ❤️')">点我一下</button>
</div>

<!-- 背景音乐 -->
<audio autoplay loop>
    <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mpeg">
</audio>

</body>
</html>
